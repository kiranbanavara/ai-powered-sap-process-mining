# Demo config: synthetic P2P event log + Anthropic Claude.
# Run:  sap-mining run --config config/config.synthetic-p2p.yaml

connector:
  kind: synthetic
  seed: 42
  n_cases: 800
  days_back: 60

llm:
  provider: anthropic
  model: claude-sonnet-4-6
  api_key: ${ANTHROPIC_API_KEY}

run:
  process: p2p
  window_days: 60

output:
  directory: reports
  filename_template: "p2p-synthetic-{date}.md"
